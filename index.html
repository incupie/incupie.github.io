<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.png">
    <link rel="stylesheet" href="/assets/style/style.css">
    <title>Incupie</title>
</head>

<body>

    <script>
        var exports;
        WebAssembly.instantiateStreaming(
            fetch("index.wasm"), {}
        ).then(results => exports = results.instance.exports);

        function run_wasm() {
            var a = document.querySelector("#a").value;

            var sum = exports.sumOfInts(a);

            document.querySelector("#ret").innerHTML += `${a} => ${sum}<br/>`;
        }
    </script>

    <input type="number" id="a">
    <button onclick="run_wasm()">Trigger</button>
    <p id="ret"></p>

</body>

</html>
